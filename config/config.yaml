# ── 服务器 ──────────────────────────────────────
server:
  name: GoFast
  driver: gin              # fiber / gin
  host: 0.0.0.0
  port: 3000
  mode: debug                # debug / release
  read_timeout_sec: 30
  write_timeout_sec: 30
  idle_timeout_sec: 120
  shutdown_timeout_sec: 10
  prefork: false
  body_limit_mb: 10
  cors_allow_origins:
    - "*"

# ── HTML 模板渲染 ────────────────────────────────
# 留空或不配置 dir 则禁用视图引擎（纯 API 项目可不配置）。
# 嵌入打包场景请不要配置此项，改在自定义 ServiceProvider 中使用 view.WithFS。
view:
  dir: resources/views       # 模板根目录（相对于项目根）
  extension: .html           # 文件扩展名过滤，空字符串表示加载全部
  reload: true               # true=开发热重载；生产环境改为 false

# ── Session ─────────────────────────────────────
session:
  lifetime: 7200             # 会话有效期（秒），默认 2 小时
  cookie: go_fast_session    # 保存 Session ID 的 Cookie 名称

# ── 数据库 ──────────────────────────────────────
database:
  driver: sqlite             # sqlite / mysql / postgres / mssql
  database: database/gofast.db
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 60      # 分钟
  conn_max_idle_time: 30     # 分钟

# ── 日志 ────────────────────────────────────────
log:
  level: debug               # debug / info / warn / error / fatal / panic
  format: color              # color / json / text
  output_path: storage/logs/app.log
  max_size: 100              # MB
  max_backups: 5
  max_age: 30                # 天
  compress: false

# ── 文件系统 ────────────────────────────────────
filesystem:
  default: local
  disks:
    local:
      driver: local
      root: storage/app
      url: /storage

# ── 缓存 ────────────────────────────────────────
cache:
  driver: memory
  memory:
    shard_count: 32
    clean_interval: 60       # 秒

# ── gRPC ─────────────────────────────────────────────────────────────
grpc:
  host: 0.0.0.0
  port: 9000
  mode: debug                          # debug（开启 reflection）/ release
  max_recv_msg_size_mb: 4
  max_send_msg_size_mb: 4
  max_conn_age_sec: 300                # 单个连接最大存活时间（秒）
  max_conn_age_grace_sec: 5            # 超过 max_conn_age 后的宽限期（秒）
  keepalive_time_sec: 60               # Keepalive ping 间隔
  keepalive_timeout_sec: 20            # Keepalive 超时

  # TLS（可选，留空则不启用）
  tls:
    cert_file: ""
    key_file: ""

