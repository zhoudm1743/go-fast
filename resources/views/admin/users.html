<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — GoFast Admin</title>
  <link rel="stylesheet" href="/static/admin/style.css">
</head>
<body>

<header class="navbar">
  <a class="brand" href="/pages">⚡ GoFast Admin</a>
  <nav>
    <a href="/pages/dashboard" {{if eq .Active "dashboard"}}class="active"{{end}}>控制面板</a>
    <a href="/pages/users"     {{if eq .Active "users"}}class="active"{{end}}>用户管理</a>
  </nav>
</header>

<main class="container">
  <h1>{{.Title}}</h1>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>用户名</th>
          <th>邮箱</th>
          <th>注册时间</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody>
        {{range $i, $u := .Users}}
        <tr>
          <td>{{inc $i}}</td>
          <td>{{$u.Name}}</td>
          <td>{{$u.Email}}</td>
          <td>{{$u.CreatedAt}}</td>
          <td>
            {{if $u.Active}}
              <span class="badge active">正常</span>
            {{else}}
              <span class="badge inactive">禁用</span>
            {{end}}
          </td>
        </tr>
        {{else}}
        <tr><td colspan="5" class="empty">暂无数据，先调用 /admin/users 接口创建一些用户吧</td></tr>
        {{end}}
      </tbody>
    </table>
  </div>
</main>

</body>
</html>
